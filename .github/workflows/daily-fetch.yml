name: MLB PICK 데이터 수집 (19시)

on:
  schedule:
    - cron: "0 10 * * *"   # UTC 10:00 = 한국시간(KST) 19:00
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: MLB 데이터 수집 실행
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node fetch-mlb-data.js
